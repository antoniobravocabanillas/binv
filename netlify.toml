[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22.13.0"
  PRISMA_GENERATE_SKIP_AUTOINSTALL = "true"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

